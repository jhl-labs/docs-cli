name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - docs/**
      - internal/render/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: jhl-space
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI and render docs site
        shell: bash
        run: |
          set -euo pipefail
          go build -trimpath -o bin/docs-cli ./cmd/docs-cli
          bin/docs-cli render . --format html
          mkdir -p public
          cp -r docs/_site/* public/
          cp docs/install.sh public/install.sh
          if [[ -f docs/_site/README.html ]]; then
            cp docs/_site/README.html public/index.html
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
