name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - docs/**
      - site/**
      - internal/render/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: jhl-space
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI and assemble Pages site
        shell: bash
        run: |
          set -euo pipefail
          go build -trimpath -o bin/docs-cli ./cmd/docs-cli
          # Render the standardized docs to HTML.
          bin/docs-cli render . --format html
          # Assemble: landing site at root, rendered docs under /docs/.
          mkdir -p public
          cp -r site/. public/
          mkdir -p public/docs
          cp -r docs/_site/. public/docs/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
